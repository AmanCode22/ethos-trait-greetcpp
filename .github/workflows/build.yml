name: Build for MacOS and Linux

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            ext: so
            asset_suffix: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            asset_suffix: linux-arm64
            arch: arm64
            ext: so
          - os: macos-15-intel
            platform: macos
            arch: intel
            ext: dylib
            asset_suffix: macos-intel
            
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: dylib
            asset_suffix: macos-arm64
    
    steps:
      - name: Checkout trait
        uses: actions/checkout@v4
        
      - name: Install build tools
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake gcc
          else
            brew update
            brew install cmake
          fi
          
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        
      - name: Build
        run: cmake --build build --config Release
        
      - name: Read trait name from config
        id: config
        run: |
          NAME=$(grep '"name"' manifest.json | cut -d'"' -f4)
          echo "trait_name=$NAME" >> $GITHUB_OUTPUT
      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/lib${{ steps.config.outputs.trait_name }}.${{ matrix.ext }}
          asset_name: ${{ steps.config.outputs.trait_name }}-${{ matrix.asset_suffix }}.${{ matrix.ext }}
          tag: ${{ github.ref_name }}
          overwrite: true
  trigger-windows:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger windows workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Build for windows" \
            --ref ${{ github.ref_name }} \
            -f tag_name="${{ github.event.release.tag_name }}" \
            --repo ${{ github.repository }}
