name: Build for windows

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x64
            msvc_arch: x64
            asset_suffix: x86_64
          - arch: ARM64
            msvc_arch: amd64_arm64
            asset_suffix: arm64

    steps:
      - name: Checkout trait
        uses: actions/checkout@v4
        
      - name: Configure MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}
          
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -A ${{ matrix.arch }}
        
      - name: Build
        run: cmake --build build --config Release
        
      - name: Read trait name from config
        id: config
        shell: pwsh
        run: |
          $NAME = (Get-Content manifest.json | ConvertFrom-Json).name
          echo "trait_name=$NAME" >> $env:GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/Release/${{ steps.config.outputs.trait_name }}.dll
          asset_name: ${{ steps.config.outputs.trait_name }}-windows-${{ matrix.asset_suffix }}.dll
          tag: ${{ github.event.inputs.tag_name }}  
          overwrite: true
  trigger-termux:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger termux workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Build for termux" \
            --ref ${{ github.ref_name }} \
            -f tag_name="${{ github.event.inputs.tag_name }}" \
            --repo ${{ github.repository }}
